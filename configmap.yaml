apiVersion: v1
kind: ConfigMap
metadata:
  name: django-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  django-dashboard.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "graphTooltip": 0,
      "id": 1,
      "panels": [

        {
          "title": "Django Request Rate",
          "type": "graph",
          "datasource": "Prometheus",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(django_http_requests_total_by_method_total[1m])) by (method)",
              "legendFormat": "{{method}} {{status}}",
              "refId": "A"
            }
          ]
        },

        {
          "title": "Django Response Time (Avg)",
          "type": "graph",
          "datasource": "Prometheus",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(django_http_requests_latency_seconds_by_view_method_sum[5m])) by (view) / sum(rate(django_http_requests_latency_seconds_by_view_method_count[5m])) by (view)",
              "legendFormat": "{{method}} {{view}}",
              "refId": "A"
            }
          ]
        },

        {
          "title": "Memory Usage",
          "type": "graph",
          "datasource": "Prometheus",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "sum(process_resident_memory_bytes)",
              "legendFormat": "Memory",
              "refId": "A"
            }
          ]
        },

        {
          "title": "Process CPU Usage",
          "type": "graph",
          "datasource": "Prometheus",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "expr": "sum(rate(process_cpu_seconds_total[5m]))",
              "legendFormat": "CPU",
              "refId": "A"
            }
          ]
        }

      ],
      "schemaVersion": 25,
      "style": "dark",
      "tags": ["django", "kubernetes", "prometheus"],
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timezone": "",
      "title": "Django Application Dashboard",
      "uid": "django_app_dashboard",
      "version": 1
    }